<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horarios - CG Estética y Belleza</title>
    
    <!-- Fuentes para mantener la estética elegante -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#fbf8f4',      // Crema claro del fondo
                            card: '#ebd4ce',    // Rosa/durazno suave de las cajas
                            primary: '#c8877a', // Terracota de los textos fuertes
                            text: '#5c4a45',    // Marrón oscuro para legibilidad
                            crossed: '#a89f9d'  // Grisáceo para los tachados
                        }
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Montserrat"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- html2canvas para generar la imagen -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { background-color: #fbf8f4; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        /* Animación suave al tachar */
        .slot-btn { transition: all 0.3s ease; }
        /* Ocultar scrollbars para que se vea más como una app */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const App = () => {
            const [bookedSlots, setBookedSlots] = useState({});
            const [isGenerating, setIsGenerating] = useState(false);
            const captureRef = useRef(null);

            const morningSlots = ['08:30', '09:00', '09:30', '10:00', '10:30'];
            const afternoonSlots = ['14:00', '14:30', '15:00', '15:30', '16:00', '16:30', '17:00', '17:30', '18:00', '18:30', '19:00', '19:30', '20:00'];

            const toggleSlot = (time) => {
                setBookedSlots(prev => ({
                    ...prev,
                    [time]: !prev[time]
                }));
            };

            const downloadImage = async () => {
                setIsGenerating(true);
                try {
                    const canvas = await html2canvas(captureRef.current, {
                        scale: 2, // Mayor calidad
                        backgroundColor: '#fbf8f4',
                        useCORS: true
                    });
                    
                    const image = canvas.toDataURL("image/png");
                    const link = document.createElement('a');
                    link.href = image;
                    // Nombre del archivo con la fecha de hoy
                    const date = new Date().toISOString().split('T')[0];
                    link.download = `horarios-cg-${date}.png`;
                    link.click();
                } catch (error) {
                    console.error("Error al generar imagen:", error);
                    alert("Hubo un problema al generar la imagen. Intenta de nuevo.");
                } finally {
                    setIsGenerating(false);
                }
            };

            const renderSlot = (time) => {
                const isBooked = bookedSlots[time];
                return (
                    <button
                        key={time}
                        onClick={() => toggleSlot(time)}
                        className={`slot-btn w-full py-2.5 rounded-lg text-sm font-semibold border shadow-sm flex items-center justify-center
                            ${isBooked 
                                ? 'bg-gray-100 border-gray-200 text-brand-crossed opacity-60' 
                                : 'bg-brand-card border-brand-primary/20 text-brand-text hover:bg-[#e4c9c3]'
                            }`}
                    >
                        <span className={isBooked ? 'line-through decoration-brand-primary/60 decoration-2' : ''}>
                            {time}
                        </span>
                    </button>
                );
            };

            return (
                <div className="min-h-screen bg-brand-bg font-sans flex flex-col items-center py-4 px-4 sm:px-6">
                    
                    {/* Área que se captura en la imagen */}
                    <div 
                        ref={captureRef} 
                        className="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-brand-card/50 relative"
                        style={{ minHeight: '85vh', display: 'flex', flexDirection: 'column' }}
                    >
                        {/* Decoración superior */}
                        <div className="absolute top-0 left-0 w-full h-32 bg-brand-card opacity-30 rounded-b-[50%] -translate-y-16"></div>

                        {/* Cabecera */}
                        <div className="text-center pt-8 pb-4 px-6 relative z-10 flex flex-col items-center">
                            {/* Logo arriba de todo */}
                            <img 
                                src="Logo_1.png" 
                                alt="Logo CG Belleza y Estética" 
                                className="w-32 h-auto object-contain drop-shadow-sm mb-4"
                            />
                            <h2 className="text-brand-primary font-bold text-xs tracking-widest uppercase mb-1">Reserva tu turno</h2>
                            <h1 className="font-serif text-3xl font-semibold text-brand-text">Horarios Disponibles</h1>
                            <p className="text-sm text-brand-text/70 mt-2 font-light">Toca un horario para tacharlo</p>
                        </div>

                        {/* Contenedor de Horarios */}
                        <div className="flex-1 px-6 pb-6 flex flex-col gap-6 relative z-10">
                            
                            {/* Mañana */}
                            <div>
                                <div className="flex items-center gap-2 mb-3">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-brand-primary"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                                    <h3 className="font-serif text-xl font-medium text-brand-text">Mañana</h3>
                                </div>
                                <div className="grid grid-cols-3 gap-3">
                                    {morningSlots.map(renderSlot)}
                                </div>
                            </div>

                            {/* Tarde divisor */}
                            <div className="w-full border-t border-brand-card/60 my-2"></div>

                            {/* Tarde */}
                            <div className="flex-1">
                                <div className="flex items-center gap-2 mb-3">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-brand-primary"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                                    <h3 className="font-serif text-xl font-medium text-brand-text">Tarde</h3>
                                </div>
                                {/* Usamos 4 columnas para que entren todos sin hacer scroll infinito */}
                                <div className="grid grid-cols-4 gap-2.5">
                                    {afternoonSlots.map(renderSlot)}
                                </div>
                            </div>
                        </div>

                        {/* Footer Info (Actualizado con diseño del flyer original) */}
                        <div className="bg-white mt-auto p-5 pb-6 border-t border-brand-card/50 flex flex-col items-center justify-center text-brand-text rounded-b-3xl">
                            
                            {/* Contacto Centrado */}
                            <div className="flex flex-col gap-2 text-left">
                                <p className="text-brand-primary font-bold text-xs tracking-widest uppercase flex items-center gap-1 mb-1">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-3 h-3 text-brand-primary"><path d="m9 18 6-6-6-6"/></svg>
                                    RESERVÁ TU TURNO:
                                </p>
                                <div className="flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 text-brand-primary"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                                    <span className="text-sm font-medium">291 5325816</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 text-brand-primary"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
                                    <span className="text-sm font-medium">cg.estetica.belleza</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Botón Flotante para Descargar (NO se incluye en la captura) */}
                    <button 
                        onClick={downloadImage}
                        disabled={isGenerating}
                        className={`fixed bottom-6 right-6 lg:static lg:mt-8 bg-brand-primary text-white p-4 rounded-full shadow-lg hover:bg-brand-primary/90 hover:scale-105 transition-all flex items-center justify-center gap-2
                            ${isGenerating ? 'opacity-50 cursor-not-allowed' : ''}`}
                        title="Descargar como imagen"
                    >
                        {isGenerating ? (
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6 animate-spin"><line x1="12" x2="12" y1="2" y2="6"/><line x1="12" x2="12" y1="18" y2="22"/><line x1="4.93" x2="7.76" y1="4.93" y2="7.76"/><line x1="16.24" x2="19.07" y1="16.24" y2="19.07"/><line x1="2" x2="6" y1="12" y2="12"/><line x1="18" x2="22" y1="12" y2="12"/><line x1="4.93" x2="7.76" y1="19.07" y2="16.24"/><line x1="16.24" x2="19.07" y1="7.76" y2="4.93"/></svg>
                        ) : (
                            <>
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                                <span className="hidden lg:inline font-medium px-2">Guardar Imagen</span>
                            </>
                        )}
                    </button>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
